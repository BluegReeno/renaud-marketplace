name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  version-sync:
    name: Version sync + CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check plugin version invariant
        run: bash scripts/check_version_sync.sh
      - name: Check /improve map is up to date
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate_improve_map.py
          git diff --exit-code

  marketplace-schema:
    name: Marketplace schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate marketplace.json schema and paths
        run: bash scripts/check_marketplace_schema.sh

  test-generate-improve-map:
    name: Offline tests — generate_improve_map.py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run offline tests
        run: python3 scripts/test_generate_improve_map.py

  deno-check:
    name: Deno type check (gmail-mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type check edge function
        working-directory: servers/gmail-mcp/supabase/functions/gmail-mcp
        run: deno check index.ts
