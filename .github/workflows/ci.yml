name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  version-sync:
    name: Version sync + CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check plugin version invariant
        run: bash scripts/check_version_sync.sh

  deno-check:
    name: Deno type check (gmail-mcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type check edge function
        run: deno check servers/gmail-mcp/supabase/functions/gmail-mcp/index.ts
