name: skill-improve
description: |
  Fix a skill improvement issue from renaud-marketplace or bluegreen-marketplace.
  Reads the GitHub issue, applies the fix to the SKILL.md, bumps the version in all
  3 required files, commits, and opens a PR.

  Use when: "fix this skill issue", "improve skill", "implement skill improvement #n"
  Input: GitHub issue number (e.g. "#42" or "42")

  Suggested invocation:
    archon workflow run skill-improve "#42"

provider: claude
model: sonnet

nodes:
  # ───────────────────────────────────────────────────────────────
  # Node 1 — read skill conventions before delegating to the fix
  # ───────────────────────────────────────────────────────────────
  - id: read-skill-context
    context: fresh
    denied_tools: [Write, Edit, Bash]
    prompt: |
      Read skill-specific conventions before the fix runs.

      Issue: $ARGUMENTS

      Read these files:
      1. `CLAUDE.md` — versioning rules (the three-file sync rule is critical)
      2. `.claude-plugin/marketplace.json` — current plugin versions
      3. `plugins/` directory listing — know what plugins exist

      Output the following in your response (will be captured as node output):
      - The three-file version sync rule (verbatim from CLAUDE.md)
      - Current plugin versions from marketplace.json
      - List of existing plugins and their skills

  # ───────────────────────────────────────────────────────────────
  # Node 2 — read issue, apply fix, bump version, commit, open PR
  # ───────────────────────────────────────────────────────────────
  - id: fix
    depends_on: [read-skill-context]
    context: fresh
    prompt: |
      Fix the skill improvement issue $ARGUMENTS.

      Skill conventions (from Node 1):
      $read-skill-context.output

      ## Step 1 — Read the issue

      Run: `gh issue view <N> --repo BluegReeno/<repo>`
      (Strip "#" from $ARGUMENTS to get N; default repo is renaud-marketplace.)

      Parse from the issue body:
      - Skill name, plugin, repo
      - Observed behavior
      - Expected behavior
      - Suggested fix

      ## Step 2 — Read the SKILL.md

      Read `plugins/<plugin>/skills/<skill>/SKILL.md`

      ## Step 3 — Apply the fix

      Edit the SKILL.md to match the expected behavior described in the issue.
      Apply the suggested fix if it is concrete. Use judgment if it is vague.

      Follow the skill conventions from Node 1 output:
      - No `pip install` — `uv run --with` only for Python scripts
      - `allowed-tools` is space-separated in the frontmatter
      - English code/commits, French conversations

      ## Step 4 — Bump version (PATCH: 0.x.Y → 0.x.Y+1)

      Three files must be in sync — all set to the new version:
      1. `plugins/<plugin>/.claude-plugin/plugin.json` → `"version"`
      2. `plugins/<plugin>/skills/<skill>/SKILL.md` → frontmatter `version:`
      3. `.claude-plugin/marketplace.json` → plugin entry `"version"` (not top-level)

      ## Step 5 — Commit

      Stage only the modified files (plugin.json, SKILL.md, marketplace.json):
      ```bash
      git add plugins/<plugin>/.claude-plugin/plugin.json \
              plugins/<plugin>/skills/<skill>/SKILL.md \
              .claude-plugin/marketplace.json
      git commit -m "fix(<plugin>): <description of what was fixed>

      closes #<N>"
      ```

      ## Step 6 — Open a PR

      ```bash
      gh pr create \
        --repo "BluegReeno/<repo>" \
        --title "fix(<plugin>): <description>" \
        --body "closes #<N>

      ## What changed
      - <1-2 bullet points describing the fix>

      🤖 Generated with Archon skill-improve workflow"
      ```

      Output the PR URL when done.

  # ───────────────────────────────────────────────────────────────
  # Node 3 — verify version bump (the most common mistake in this repo)
  # ───────────────────────────────────────────────────────────────
  - id: verify-version-bump
    depends_on: [fix]
    context: fresh
    prompt: |
      Verify the three-file version sync rule after the fix.

      Skill context: $read-skill-context.output

      The rule (from CLAUDE.md):
      On every commit that changes plugin behaviour, these three must be identical:
      1. `plugins/<plugin>/.claude-plugin/plugin.json` → `version`
      2. `plugins/<plugin>/skills/<skill>/SKILL.md` → frontmatter `version:`
      3. `.claude-plugin/marketplace.json` → plugin entry `version`

      Steps:
      1. Identify which plugin was modified (from the fix diff: `git diff origin/main...HEAD -- plugins/`)
      2. Read the three version values for that plugin
      3. If all three match → output "✅ Version sync OK: <version>"
      4. If any mismatch → fix the diverging files to match the highest version,
         commit: `chore(<plugin>): sync version to <version>`
      5. Output the final version and confirmation

      PATCH bump (0.x.Y+1): for bug fixes, wording, template changes
      MINOR bump (0.X+1.0): for new flow, new tool, new skill
