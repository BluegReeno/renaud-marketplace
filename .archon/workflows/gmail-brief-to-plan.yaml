name: gmail-brief-to-plan
description: |
  Use when: you have the gmail-mcp brief and want an exec-ready implementation plan before coding.
  Input: path to the brief file (e.g. "breif-gmail.md") or the literal "breif-gmail.md".
  Output: `.agents/plans/gmail-mcp-plan.md` — plan shaped for archon-plan-to-pr to ingest.

  Suggested invocation:
    archon workflow run gmail-brief-to-plan "breif-gmail.md"

  After reviewing the plan, run:
    archon workflow run archon-plan-to-pr ".agents/plans/gmail-mcp-plan.md"

provider: claude

nodes:
  # ───────────────────────────────────────────────────────────────
  # Node 1 — read brief + codebase context (read-only)
  # ───────────────────────────────────────────────────────────────
  - id: read-context
    context: fresh
    denied_tools: [Write, Edit, Bash]
    prompt: |
      You are building codebase context for the gmail-mcp implementation plan.
      Do NOT write the plan yet — that is the next node.

      Brief file: $ARGUMENTS (read it with the Read tool)

      Read in order:
      1. `breif-gmail.md` — implementation brief (architecture locked, open questions resolved)
      2. `CLAUDE.md` — project rules (language policy, no pip install, versioning rules)
      3. `../hal/supabase/functions/hal-mcp/index.ts` — HAL reference implementation (auth pattern to replicate)
      4. `../hal/supabase/functions/hal-mcp/deno.json` — HAL deps (exact versions to copy)
      5. `servers/gmail-mcp/scripts/setup_secrets.sh` — secrets setup script (already written)
      6. `.claude/STATUS.md` — current project status

      Write `$ARTIFACTS_DIR/codebase-context.md` with:
      - **Locked architecture decisions** (from brief §2): list verbatim, one per bullet
      - **HAL auth pattern** (from index.ts): quote the exact `verifyAuth` call, the `/.well-known/oauth-protected-resource` handler, and the `transport.handleRequest` call with `authInfo` — these are the patterns to replicate
      - **HAL deno.json imports**: exact package versions the plan must use
      - **What already exists**: `servers/gmail-mcp/scripts/setup_secrets.sh` (done), directory skeleton
      - **What needs to be created**: `servers/gmail-mcp/supabase/`, `deno.json`, `index.ts`, `config.toml`
      - **Non-goals** (explicit, from brief): no send_email v1, no scope expansion, no separate repo, no mcp-lite
      - **Gmail API calls needed**: list the exact REST endpoints for each of the 4 tools (search_emails, read_email, draft_email, list_labels)

  # ───────────────────────────────────────────────────────────────
  # Node 2 — external research (web, read-only)
  # ───────────────────────────────────────────────────────────────
  - id: research-external
    depends_on: [read-context]
    context: fresh
    denied_tools: [Write, Edit, Bash]
    prompt: |
      You are researching the exact API signatures needed to implement gmail-mcp.
      Architecture is locked — no proposing alternatives.

      Codebase context: $read-context.output

      Research these topics:
      1. **`@supabase/server` v1.1.0** — `verifyAuth` signature, `auth` option values (`"user"`, `"secret:name"`), `createContextClient`, `createAdminClient`. Find official docs or source.
      2. **`@modelcontextprotocol/sdk` v1.25.3** — `WebStandardStreamableHTTPServerTransport` constructor and `handleRequest` signature. Quote the exact fields of the `authInfo` object it accepts.
      3. **Gmail REST API** — exact endpoints and request/response shapes for:
         - `GET /gmail/v1/users/me/messages?q=<query>` (search_emails)
         - `GET /gmail/v1/users/me/messages/{id}?format=full` (read_email)
         - `POST /gmail/v1/users/me/drafts` with body `{message: {raw: base64}}` (draft_email)
         - `GET /gmail/v1/users/me/labels` (list_labels)
      4. **Google OAuth token refresh** — `POST https://oauth2.googleapis.com/token` with `grant_type=refresh_token` — exact request body fields and response shape (focus on `access_token` and `expires_in`)
      5. **Supabase Edge Function deploy** — `supabase functions deploy --no-verify-jwt` flag purpose. Any gotcha with Deno imports from npm: specifiers in Supabase Edge runtime.

      Write `$ARTIFACTS_DIR/external-findings.md`:
      - One section per topic above
      - Quote exact function signatures / endpoint paths / request bodies
      - Note any version constraints or known gotchas
      - Full URLs for every source cited

  # ───────────────────────────────────────────────────────────────
  # Node 3 — write the exec-ready plan
  # ───────────────────────────────────────────────────────────────
  - id: write-plan
    depends_on: [research-external]
    context: fresh
    prompt: |
      Write the exec-ready implementation plan for gmail-mcp.
      This plan will be fed to `archon-plan-to-pr` — every task must be unambiguous.

      Codebase context: $read-context.output
      External findings: $research-external.output

      Write the plan to `.agents/plans/gmail-mcp-plan.md`. Use this structure exactly:

      ---
      # Plan — gmail-mcp (Supabase Edge MCP server for Gmail perso)

      ## Feature Description
      (2 paragraphs: what + why)

      ## Scope limits (non-goals — mandatory)
      - no send_email in v1
      - no mcp-lite
      - no separate repo
      - no scope expansion beyond gmail.modify
      - (add any others from the brief)

      ## Files to create
      (absolute paths from repo root)

      ## Files to modify
      (absolute paths, with what changes)

      ## Implementation Tasks

      ### Task 1 — supabase/config.toml
      What: ...
      File: servers/gmail-mcp/supabase/config.toml
      Content: (write the exact content — project_id = isdyvrwnxqcfalmlkzui)
      Commit: `chore(gmail-mcp): add supabase config`

      ### Task 2 — deno.json (imports)
      What: exact deps from HAL (same versions)
      File: servers/gmail-mcp/supabase/functions/gmail-mcp/deno.json
      Content: (write the exact JSON — copy HAL versions, no mcp-lite)
      Commit: `chore(gmail-mcp): add deno.json`

      ### Task 3 — index.ts skeleton (auth layer)
      What: replicate HAL auth pattern exactly — verifyAuth + /.well-known/oauth-protected-resource + CORS + transport.handleRequest with authInfo
      File: servers/gmail-mcp/supabase/functions/gmail-mcp/index.ts
      Key patterns to replicate (quote from HAL):
        - verifyAuth call with ["user", "secret:gmail_api_key"]
        - /.well-known/oauth-protected-resource response body
        - transport.handleRequest authInfo shape
      Extra: replace HAL's db/dbAdmin extra with gmailToken (from refreshGmailToken() helper)
      Commit: `feat(gmail-mcp): auth skeleton (verifyAuth + OAuth discovery)`

      ### Task 4 — refreshGmailToken() helper
      What: reads GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN from Deno.env; POSTs to https://oauth2.googleapis.com/token; returns access_token
      File: servers/gmail-mcp/supabase/functions/gmail-mcp/index.ts (same file, helper function)
      Exact POST body fields: (from external-findings)
      Error handling: throw on non-200, include error description in message
      Commit: included in Task 3

      ### Task 5 — tool: search_emails
      What: registerTool("search_emails", ...) — calls Gmail API GET /gmail/v1/users/me/messages
      Input schema: { query: string, max_results?: number (default 20) }
      Gmail endpoint: (exact URL + params from external-findings)
      Response mapping: return array of { id, threadId, snippet }
      Commit: `feat(gmail-mcp): tool search_emails`

      ### Task 6 — tool: read_email
      What: registerTool("read_email", ...) — GET /gmail/v1/users/me/messages/{id}?format=full
      Input schema: { message_id: string }
      Response mapping: extract subject, from, date headers + plain text body (decode base64url)
      Commit: `feat(gmail-mcp): tool read_email`

      ### Task 7 — tool: draft_email
      What: registerTool("draft_email", ...) — POST /gmail/v1/users/me/drafts
      Input schema: { to: string, subject: string, body: string, reply_to_message_id?: string }
      Request body: RFC 2822 message encoded as base64url in raw field
      Commit: `feat(gmail-mcp): tool draft_email`

      ### Task 8 — tool: list_labels
      What: registerTool("list_labels", ...) — GET /gmail/v1/users/me/labels
      Input schema: {} (no params)
      Response: array of { id, name, type }
      Commit: `feat(gmail-mcp): tool list_labels`

      ### Task 9 — .gitignore for servers/gmail-mcp
      What: add servers/gmail-mcp/supabase/.env to root .gitignore (Supabase CLI local secrets)
      Commit: included in Task 1

      ## Testing / Validation
      - [ ] `supabase functions deploy --no-verify-jwt gmail-mcp --project-ref isdyvrwnxqcfalmlkzui`
      - [ ] `npx @modelcontextprotocol/inspector https://isdyvrwnxqcfalmlkzui.supabase.co/functions/v1/gmail-mcp` — list 4 tools
      - [ ] `search_emails` with query "from:recruiter" — returns results
      - [ ] `read_email` with a valid message_id — returns subject + body
      - [ ] Bearer mode: `curl -H "apikey: $GMAIL_API_KEY" <url>/.well-known/oauth-protected-resource` — returns JSON

      ## Acceptance criteria
      - 4 tools registered and callable via MCP Inspector
      - Bearer auth works (apikey header)
      - OAuth discovery endpoint returns correct authorization_servers URL
      - No secrets in committed code
      ---

      After writing the file, run:
      ```
      git add .agents/plans/gmail-mcp-plan.md .archon/workflows/gmail-brief-to-plan.yaml
      git commit -m "plan(gmail-mcp): exec-ready implementation plan"
      ```

      Print to stdout:
      1. Absolute path of the plan file
      2. Current branch
      3. One-paragraph TL;DR

  # ───────────────────────────────────────────────────────────────
  # Node 4 — human gate
  # ───────────────────────────────────────────────────────────────
  - id: human-gate
    depends_on: [write-plan]
    approval:
      message: |
        Plan written at `.agents/plans/gmail-mcp-plan.md` and committed locally.

        $write-plan.output

        Review the plan, then reply:
        - `accept` → plan is ready, run archon-plan-to-pr next
        - `redo <angle>` → re-run with a specific change
        - `done` → keep local, nothing else
      capture_response: true
